on:
  workflow_dispatch:
  push:
    
env:
  APP_NAME: governor-api
  IMAGE_REPO: ghcr.io/metal-toolbox/governor-api

jobs:
  setup:
    name: ⚙️ setup
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.run_number }}-${{ steps.shortsha.outputs.short-sha }}
      image_repo: ${{ env.IMAGE_REPO }}
      app_name: ${{ env.APP_NAME }}
    steps:
      - id: shortsha
        uses: metal-toolbox/ci-toolbox/actions/short-sha@v0.0.2

  lint: 
    name: 📎 lint
    runs-on: ubuntu-latest
    steps:
      - uses: metal-toolbox/ci-toolbox/actions/golangci-lint@v0.0.2

  test:
    name: 🧪 test
    runs-on: ubuntu-latest
    container: golang:1.25.7
    services:
      pg: 
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: governor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      GOVERNOR_DB_URI: postgresql://postgres:postgres@pg:5432/governor_test?sslmode=disable
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: tests
        run: make ci-test
        
  build-go:
    name: 🏗️ build go
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
      GOOS: linux
    steps:
      - uses: metal-toolbox/ci-toolbox/actions/setup-go@v0.0.2
      - name: build
        run: go build -buildvcs=false -mod=mod -a -o bin/${{ env.APP_NAME }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.APP_NAME }}-bin
          path: bin/${{ env.APP_NAME }}
    outputs:
      artifact-name: ${{ env.APP_NAME }}-bin

  build-docker:
    name: 🐳 build and publish docker image
    needs:
      - lint
      - test
      - build-go
      - setup
    permissions:
      contents: write
      id-token: write
      packages: write
    uses: metal-toolbox/ci-toolbox/.github/workflows/build-docker.yaml@v0.0.2
    with:
      artifact-name: ${{ needs.build-go.outputs.artifact-name }}
      artifact-path: bin
      user: ${{ github.actor }}
      image-repo: ${{ needs.setup.outputs.image_repo }}
      image-tag: ${{ needs.setup.outputs.image_tag }}
      build-args: |
        BIN=bin/${{ needs.setup.outputs.app_name }}
    secrets: inherit

  trivy-scan:
    name: 🔍 scan image
    needs:
      - build-docker
      - setup
    permissions:
      contents: read
      security-events: write
    uses: metal-toolbox/ci-toolbox/.github/workflows/trivy.yaml@v0.0.2
    with:
      scan-type: image
      image-ref: ${{ needs.setup.outputs.image_repo }}:${{ needs.setup.outputs.image_tag }}
